name: push-trunk

on:
  push:
    branches: [ trunk ]
#  pull_request:
#    branches: [ main ]

jobs:
  docker:
    name: Build Docker image
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Clone l'historique complet et les tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version from git describe
        id: version
        run: |
          RAW=$(git describe --tags)
          VERSION=$(echo "$RAW" | sed 's/^v\([0-9]*\.[0-9]*\)-\([0-9]*\).*/\1-\2/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build container image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/abls-habitat-api:latest
            ${{ secrets.DOCKER_USERNAME }}/abls-habitat-api:${{ steps.version.outputs.version }}
